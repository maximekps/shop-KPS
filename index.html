<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --card-bg: rgba(22, 12, 15, 0.65);
            --accent-red: #ff003c; 
            --accent-red-glow: rgba(255, 0, 60, 0.4);
            --text-main: #ffffff;
            --text-muted: #b5b5b5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Urbanist', sans-serif;
            background: linear-gradient(135deg, #0a0508 0%, #030305 50%, #050914 100%);
            color: var(--text-main);
            margin: 0; padding: 20px; min-height: 100vh;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 46px; font-weight: 900; letter-spacing: 10px; margin: 0; text-transform: uppercase; color: #fff; }
        header p { color: var(--accent-red); font-size: 11px; letter-spacing: 3px; font-weight: 900; margin-top: 8px; }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card {
            background: var(--card-bg); border-radius: 20px; padding: 16px; border: 1px solid rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); display: flex; flex-direction: column;
        }
        .img-box { width: 100%; aspect-ratio: 1/1; border-radius: 14px; background: rgba(0,0,0,0.4); margin-bottom: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255, 0, 60, 0.1); }
        .p-name { font-size: 12px; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .p-price { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 10px; }
        .btn-order { background: var(--accent-red); color: #fff; border: none; border-radius: 12px; padding: 10px; font-weight: 700; cursor: pointer; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; z-index: 1000; }
        .modal-content { width: 100%; background: #0b0607; border-radius: 32px 32px 0 0; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        .storage-btn, .color-btn { background: #12090a; border: 1px solid #281214; padding: 12px; border-radius: 12px; font-size: 12px; cursor: pointer; text-align: center; }
        .storage-btn.active, .color-btn.active { border-color: var(--accent-red); background: rgba(255, 0, 60, 0.2); }
        input { width: 100%; background: #12090a; border: 1px solid #281214; border-radius: 14px; padding: 14px; color: #fff; }
        .btn-confirm { background: var(--accent-red); color: #fff; width: 100%; padding: 18px; border-radius: 16px; font-weight: 900; border: none; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>K P S</h1>
        <p>REFUND APPLE</p>
    </header>

    <div class="product-grid" id="grid"></div>

    <!-- Modal Commande -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2 id="m-title" style="text-align:center;">Produit</h2>
            <div id="variant-section"></div>
            <div class="form-group">
                <label>Stockage</label>
                <div id="storage-container" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 5px;"></div>
            </div>
            <div class="form-group">
                <label>Couleur</label>
                <div id="color-container" style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 5px;"></div>
            </div>
            <input type="text" id="nom" placeholder="Nom complet">
            <button class="btn-confirm" onclick="finishOrder()">Valider</button>
        </div>
    </div>

    <script>
        const products = [
            { name: "iPhone 14 Pro", price: "110€", storage: ["128Go", "256Go", "512Go"], colors: ["Noir", "Argent", "Or", "Violet"] },
            { name: "iPhone 15", price: "130€", storage: ["128Go", "256Go"], colors: ["Noir", "Bleu", "Rose", "Vert"] },
            { name: "iPhone 16", price: "230€", storage: ["128Go", "256Go", "512Go"], colors: ["Noir", "Blanc", "Rose", "Ultramarine"] }
        ];

        let selectedProduct = null;
        let selectedVariant = "Pro";

        const grid = document.getElementById('grid');
        products.forEach((p, index) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `<div class="img-box">${p.name}</div>
                             <div class="p-name">${p.name}</div>
                             <div class="p-price">${p.price}</div>
                             <button class="btn-order" onclick="openOrder(${index})">Commander</button>`;
            grid.appendChild(card);
        });

        function openOrder(index) {
            selectedProduct = products[index];
            document.getElementById('m-title').innerText = selectedProduct.name;
            
            // Logique Variante (Pro vs Pro Max)
            const vSec = document.getElementById('variant-section');
            if(selectedProduct.name.includes("14") || selectedProduct.name.includes("15") || selectedProduct.name.includes("16")) {
                vSec.innerHTML = `<div class="form-group"><label>Modèle</label>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="storage-btn active" id="v1" onclick="setVariant('v1', 'Pro')">Pro</div>
                        <div class="storage-btn" id="v2" onclick="setVariant('v2', 'Pro Max')">Pro Max</div>
                    </div></div>`;
            } else { vSec.innerHTML = ""; }

            renderOptions();
            document.getElementById('modal').style.display = 'flex';
        }

        function setVariant(id, val) {
            document.querySelectorAll('.storage-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            selectedVariant = val;
            document.getElementById('m-title').innerText = selectedProduct.name.replace("Pro", "").replace("Max", "").trim() + " " + val;
        }

        function renderOptions() {
            const sCont = document.getElementById('storage-container');
            sCont.innerHTML = "";
            selectedProduct.storage.forEach(s => {
                sCont.innerHTML += `<div class="storage-btn" onclick="select(this)">${s}</div>`;
            });
            const cCont = document.getElementById('color-container');
            cCont.innerHTML = "";
            selectedProduct.colors.forEach(c => {
                cCont.innerHTML += `<div class="color-btn" onclick="select(this)">${c}</div>`;
            });
        }

        function select(el) {
            el.parentElement.querySelectorAll('div').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function finishOrder() {
            alert("Commande en préparation pour : " + document.getElementById('m-title').innerText);
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
