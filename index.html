<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPS PREMIUM STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --card-bg: rgba(26, 15, 18, 0.95);
            --accent-red: #ff003c; /* Rouge Vif Fluo Principal */
            --accent-red-glow: rgba(255, 0, 60, 0.4);
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Urbanist', sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #2e1015 0%, #050508 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- ÉCRAN DE CHARGEMENT --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .splash-logo-container {
            width: 220px; height: 220px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        .splash-logo-img {
            width: 100%; height: 100%; object-fit: contain;
            mix-blend-mode: screen; /* Fusion parfaite dans la masse */
            filter: drop-shadow(0 0 15px var(--accent-red-glow));
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 30px var(--accent-red)); }
        }

        .loading-bar-container {
            width: 70%; max-width: 250px; height: 4px;
            background: rgba(255,255,255,0.05); border-radius: 10px;
            overflow: hidden; margin-top: 20px;
        }

        .loading-bar-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #bb0024, var(--accent-red));
            box-shadow: 0 0 15px var(--accent-red);
            transition: width 0.1s linear;
        }

        #loading-pct {
            font-size: 14px; font-weight: 700; margin-top: 10px; color: var(--accent-red);
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--accent-red-glow);
        }

        /* --- CONTENU PRINCIPAL --- */
        #main-content {
            opacity: 0; transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 38px; font-weight: 900; letter-spacing: 5px; margin: 0; text-transform: uppercase; text-shadow: 0 0 15px var(--accent-red-glow); }
        header p { color: var(--accent-red); font-size: 12px; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }

        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .nav-item { 
            background: var(--card-bg); border: 1px solid rgba(255,0,60,0.15);
            border-radius: 15px; padding: 15px 5px; text-align: center;
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            transition: all 0.2s;
        }
        .nav-item:active {
            border-color: var(--accent-red);
            background: rgba(255, 0, 60, 0.1);
        }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card {
            background: var(--card-bg); border-radius: 20px; padding: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex; flex-direction: column; justify-content: space-between;
            transition: transform 0.2s;
        }
        .product-card:active { transform: scale(0.96); border-color: var(--accent-red); box-shadow: 0 0 15px rgba(255, 0, 60, 0.2); }

        .img-box { 
            width: 100%; aspect-ratio: 1/1; border-radius: 15px; 
            background: #000; overflow: hidden; margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        .p-name { font-size: 12px; font-weight: 700; height: 32px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .p-price { font-size: 18px; font-weight: 900; color: #ffffff; margin: 8px 0; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
        
        .btn-order {
            background: linear-gradient(135deg, var(--accent-red), #990024);
            color: #fff; border: none; border-radius: 12px; padding: 12px;
            font-weight: 800; font-size: 11px; text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(255, 0, 60, 0.4);
            cursor: pointer;
        }

        /* --- MODAL FORMULAIRE --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; align-items: flex-end; z-index: 10000;
        }
        .modal-content {
            width: 100%; background: #140d0f; border-radius: 30px 30px 0 0;
            padding: 30px; border-top: 3px solid var(--accent-red);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
        .form-group input { 
            width: 100%; background: #1a1415; border: 1px solid #332225; 
            border-radius: 12px; padding: 15px; color: #fff; outline: none;
        }
        .form-group input:focus { border-color: var(--accent-red); box-shadow: 0 0 8px rgba(255, 0, 60, 0.2); }

        .btn-confirm {
            background: linear-gradient(135deg, var(--accent-red), #c8002e);
            color: #fff; width: 100%;
            padding: 18px; border-radius: 15px; font-weight: 900; border: none;
            text-transform: uppercase; margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.4);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="https://i.ibb.co/60Kf4nHR/image.png" class="splash-logo-img">
        </div>
        <div class="loading-bar-container"><div class="loading-bar-fill" id="bar"></div></div>
        <div id="loading-pct">0%</div>
    </div>

    <div id="main-content">
        <header>
            <h1>K P S</h1>
            <p>Premium Luxury Store</p>
        </header>

        <div class="nav-grid">
            <div class="nav-item">💬</div>
            <div class="nav-item">⭐</div>
            <div class="nav-item">👤</div>
            <div class="nav-item">📢</div>
        </div>

        <div class="product-grid" id="grid"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div style="text-align:center; margin-bottom:20px;">
                <h2 id="m-title" style="margin:0;">Produit</h2>
                <span id="m-price" style="color:var(--accent-red); font-weight:900; font-size: 22px;">0€</span>
            </div>
            <div class="form-group"><label>Nom</label><input type="text" id="nom"></div>
            <div class="form-group"><label>Prénom</label><input type="text" id="prenom"></div>
            <div class="form-group"><label>Email</label><input type="email" id="mail"></div>
            <div class="form-group"><label>Adresse de livraison</label><input type="text" id="adresse"></div>
            <button class="btn-confirm" onclick="finish()">🔥 Valider la commande</button>
            <button style="background:none; border:none; color:#777; width:100%; margin-top:15px; font-weight: 700;" onclick="closeM()">Annuler</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const products = [
            { name: "iPhone 14 Pro Max", price: "110€", img: "https://images.unsplash.com/photo-1663499482523-1c0c1bae4ce1?w=400&q=80" },
            { name: "iPhone 15 Plus", price: "130€", img: "https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400&q=80" },
            { name: "iPhone 15 Pro Max", price: "150€", img: "https://images.unsplash.com/photo-1695048133044-8d4512e06f15?w=400&q=80" },
            { name: "iPhone 16 Plus", price: "230€", img: "https://images.unsplash.com/photo-1726837021415-325b7b9ca8cc?w=400&q=80" },
            { name: "iPhone 16 Pro Max", price: "250€", img: "https://images.unsplash.com/photo-1727376378453-27c9201bd27d?w=400&q=80" },
            { name: "iPhone 17 Air", price: "200€", img: "https://images.unsplash.com/photo-1616348436168-de43ad0db179?w=400&q=80" },
            { name: "iPhone 17", price: "270€", img: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=400&q=80" },
            { name: "iPhone 17 Pro", price: "320€", img: "https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?w=400&q=80" },
            { name: "iPhone 17 Pro Max", price: "350€", img: "https://images.unsplash.com/photo-1573148195900-7845dcb9b127?w=400&q=80" },
            { name: "MacBook Pro M3", price: "330€", img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400&q=80" },
            { name: "MacBook Neo Base", price: "150€", img: "https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?w=400&q=80" },
            { name: "MacBook Neo Sup.", price: "180€", img: "https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=400&q=80" }
        ];

        const grid = document.getElementById('grid');
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `<div class="img-box"><img src="${p.img}"></div>
                             <div class="p-name">${p.name}</div>
                             <div class="p-price">${p.price}</div>
                             <button class="btn-order" onclick="openM('${p.name}', '${p.price}')">Commander</button>`;
            grid.appendChild(card);
        });

        let currentP = "";
        let currentPr = "";

        function openM(n, p) {
            currentP = n; currentPr = p;
            document.getElementById('m-title').innerText = n;
            document.getElementById('m-price').innerText = p;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeM() { document.getElementById('modal').style.display = 'none'; }

        function finish() {
            const n = document.getElementById('nom').value;
            const pr = document.getElementById('prenom').value;
            const m = document.getElementById('mail').value;
            const a = document.getElementById('adresse').value;
            
            if(!n || !pr || !m || !a) { alert("Remplis tout !"); return; }

            const txt = `🛒 NOUVELLE COMMANDE KPS 🛒\n\nProduit: ${currentP}\nPrix: ${currentPr}\n\nClient: ${pr} ${n}\nEmail: ${m}\nAdresse: ${a}`;
            
            navigator.clipboard.writeText(txt).then(() => {
                alert("Infos copiées ! Redirection vers @maxime_kps3...");
                window.location.href = "https://t.me/maxime_kps3";
            });
        }

        let p = 0;
        const i = setInterval(() => {
            p += Math.floor(Math.random() * 5) + 2;
            if(p >= 100) {
                p = 100; clearInterval(i);
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    document.getElementById('splash-screen').style.visibility = 'hidden';
                    document.getElementById('main-content').style.opacity = '1';
                    document.getElementById('main-content').style.transform = 'translateY(0)';
                }, 500);
            }
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('loading-pct').innerText = p + '%';
        }, 80);
    </script>
</body>
</html>
