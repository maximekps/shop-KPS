<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPS PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(26, 26, 36, 0.9);
            --accent-neon: #00f0ff; /* Bleu Cyan Ultra Lumineux */
            --btn-neon: #ff003c; /* Rouge Vif Fluo */
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --border-neon: rgba(0, 240, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #1f1f2e 0%, #0b0c10 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- SPLASH SCREEN AVEC LOGO INCRUSTÉ --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050508;
            background: radial-gradient(circle at center, #151622 0%, #050508 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .splash-logo-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .splash-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: screen;
            opacity: 0.9;
            filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.4));
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { transform: scale(0.98); filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.3)); }
            100% { transform: scale(1.03); filter: drop-shadow(0 0 30px var(--accent-neon)); }
        }

        .loading-wrapper {
            width: 75%;
            max-width: 280px;
        }

        .loading-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        #loading-text {
            color: var(--accent-neon);
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff003c, #00f0ff);
            box-shadow: 0 0 10px var(--accent-neon);
            transition: width 0.1s linear;
        }

        /* --- INTERFACE PRINCIPALE --- */
        #main-content {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            padding: 16px;
            padding-bottom: 60px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        header p {
            color: var(--accent-neon);
            font-size: 12px;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
        }

        .quick-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .nav-item {
            background: var(--card-bg);
            border: 1px solid var(--border-neon);
            border-radius: 12px;
            padding: 12px 4px;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.05);
        }

        .nav-item:active {
            border-color: var(--accent-neon);
            background: rgba(0, 240, 255, 0.1);
            transform: scale(0.95);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .nav-icon {
            font-size: 18px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            padding-left: 8px;
            border-left: 3px solid var(--accent-neon);
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        /* GRILLE DE 12 PRODUITS */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }

        .product-card:active {
            transform: scale(0.97);
            border-color: var(--accent-neon);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .product-image-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            background: #14141f;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }

        .product-price {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-neon);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .buy-button {
            background: linear-gradient(135deg, #ff003c 0%, #990024 100%);
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(255, 0, 60, 0.3);
            transition: all 0.2s;
        }

        .buy-button:active {
            transform: scale(0.95);
            box-shadow: 0 0 8px rgba(255, 0, 60, 0.6);
        }

        /* --- MODAL FORMULAIRE --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 4, 6, 0.85);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: flex-end;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            width: 100%;
            background: #111217;
            border-top: 3px solid var(--accent-neon);
            border-radius: 26px 26px 0 0;
            padding: 24px;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 22px;
            position: relative;
        }

        .modal-badge {
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--accent-neon);
            color: var(--accent-neon);
            font-weight: 800;
            padding: 6px 18px;
            border-radius: 20px;
            display: inline-block;
            font-size: 15px;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .close-btn {
            position: absolute;
            right: 0;
            top: 0;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent-neon);
            background: rgba(0, 240, 255, 0.02);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .submit-order-btn {
            background: linear-gradient(135deg, #00f0ff 0%, #007780 100%);
            color: #0b0c10;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3);
        }

        .submit-order-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="https://i.ibb.co/60Kf4nHR/image.png" class="splash-logo-img" alt="KPS Logo">
        </div>
        <div class="loading-wrapper">
            <div class="loading-info">
                <span>Initialisation</span>
                <span id="loading-text">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h1>K P S</h1>
            <p>Premium Store</p>
        </header>

        <div class="quick-nav">
            <div class="nav-item"><span class="nav-icon">💬</span>Contact</div>
            <div class="nav-item"><span class="nav-icon">⭐</span>Avis</div>
            <div class="nav-item"><span class="nav-icon">👤</span>Compte</div>
            <div class="nav-item"><span class="nav-icon">📢</span>Canal</div>
        </div>

        <div class="section-title">Catalogue Exclusif</div>
        <div class="products-grid" id="grid"></div>
    </div>

    <div class="modal-overlay" id="orderModal">
        <div class="modal-box">
            <div class="modal-header">
                <button class="close-btn" onclick="closeModal()">×</button>
                <h2 id="modalProductName" style="margin:5px 0; font-size:22px; font-weight:800;">Produit</h2>
                <div class="modal-badge" id="modalProductPrice">0€</div>
            </div>
            
            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="lastName" placeholder="Votre nom">
            </div>
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" id="firstName" placeholder="Votre prénom">
            </div>
            <div class="form-group">
                <label>Adresse Mail</label>
                <input type="email" id="email" placeholder="Ex: contact@domaine.com">
            </div>
            <div class="form-group">
                <label>Adresse Postale (Lieu de résidence)</label>
                <input type="text" id="address" placeholder="Adresse complète, Code postal, Ville">
            </div>

            <button class="submit-order-btn" onclick="sendOrder()">🛒 Confirmer la commande</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let selectedProduct = {};

        // Base de données exacte des 12 modèles avec images réelles adaptées et fonctionnelles
        const products = [
            { id: 1, name: "iPhone 14 Pro / Max", price: "110€", img: "https://images.unsplash.com/photo-1678685888221-cda773a3dcdb?w=400&auto=format&fit=crop&q=80" },
            { id: 2, name: "iPhone 15 / Plus", price: "130€", img: "https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400&auto=format&fit=crop&q=80" },
            { id: 3, name: "iPhone 15 Pro / Max", price: "150€", img: "https://images.unsplash.com/photo-1695048133044-8d4512e06f15?w=400&auto=format&fit=crop&q=80" },
            { id: 4, name: "iPhone 16 / Plus", price: "230€", img: "https://images.unsplash.com/photo-1726837021415-325b7b9ca8cc?w=400&auto=format&fit=crop&q=80" },
            { id: 5, name: "iPhone 16 Pro / Max", price: "250€", img: "https://images.unsplash.com/photo-1727376378453-27c9201bd27d?w=400&auto=format&fit=crop&q=80" },
            { id: 6, name: "iPhone 17 Air", price: "200€", img: "https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=400&auto=format&fit=crop&q=80" },
            { id: 7, name: "iPhone 17", price: "270€", img: "https://images.unsplash.com/photo-1592899677977-9c10ca588bbd?w=400&auto=format&fit=crop&q=80" },
            { id: 8, name: "iPhone 17 Pro", price: "320€", img: "https://images.unsplash.com/photo-1580910051074-3eb694886505?w=400&auto=format&fit=crop&q=80" },
            { id: 9, name: "iPhone 17 Pro Max", price: "350€", img: "https://images.unsplash.com/photo-1565630916779-e303be97b6f5?w=400&auto=format&fit=crop&q=80" },
            { id: 10, name: "MacBook Pro M3 14\"", price: "330€", img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400&auto=format&fit=crop&q=80" },
            { id: 11, name: "MacBook Neo Base", price: "150€", img: "https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?w=400&auto=format&fit=crop&q=80" },
            { id: 12, name: "MacBook Neo Supérieur", price: "180€", img: "https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=400&auto=format&fit=crop&q=80" }
        ];

        const grid = document.getElementById('grid');
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-image-container">
                    <img src="${product.img}" class="product-image" alt="${product.name}">
                </div>
                <div class="product-name">${product.name}</div>
                <div class="product-price">${product.price}</div>
                <button class="buy-button" onclick="openModal('${product.name}', '${product.price}')">Commander</button>
            `;
            grid.appendChild(card);
        });

        function openModal(name, price) {
            selectedProduct = { name, price };
            document.getElementById('modalProductName').innerText = name;
            document.getElementById('modalProductPrice').innerText = price;
            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        function sendOrder() {
            const nom = document.getElementById('lastName').value.trim();
            const prenom = document.getElementById('firstName').value.trim();
            const email = document.getElementById('email').value.trim();
            const adresse = document.getElementById('address').value.trim();

            if(!nom || !prenom || !email || !adresse) {
                alert("Veuillez remplir l'ensemble des champs pour valider.");
                return;
            }

            const orderText = `📦 NOUVELLE COMMANDE KPS 📦\n\n` +
                              `🔹 Produit : ${selectedProduct.name}\n` +
                              `🔹 Prix : ${selectedProduct.price}\n\n` +
                              `👤 Client : ${prenom} ${nom}\n` +
                              `📧 Email : ${email}\n` +
                              `📍 Adresse : ${adresse}`;

            navigator.clipboard.writeText(orderText).then(() => {
                alert("Détails copiés ! Vous allez être redirigé vers @maxime_kps3. Collez simplement le texte dans le chat.");
                window.location.href = "https://t.me/maxime_kps3";
            }).catch(err => {
                window.location.href = "https://t.me/maxime_kps3";
            });
        }

        // Animation de progression du Splash Screen
        const splashScreen = document.getElementById('splash-screen');
        const progressBar = document.getElementById('progress-bar');
        const loadingText = document.getElementById('loading-text');
        const mainContent = document.getElementById('main-content');

        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 7) + 3;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                
                setTimeout(() => {
                    splashScreen.style.opacity = '0';
                    splashScreen.style.visibility = 'hidden';
                    mainContent.style.opacity = '1';
                    mainContent.style.transform = 'translateY(0)';
                }, 400);
            }
            progressBar.style.width = `${progress}%`;
            loadingText.innerText = `${progress}%`;
        }, 65);
    </script>
</body>
</html>
