<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPS PREMIUM V2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #16161a;
            --accent-color: #007aff;
            --text-main: #ffffff;
            --text-muted: #a1a1a6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background: radial-gradient(circle at top, #1c1c21 0%, #0a0a0c 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        header h1 {
            font-size: 24px;
            margin: 0;
            letter-spacing: 1px;
            background: linear-gradient(to bottom, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 5px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.08);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            margin-bottom: 12px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: #111;
        }

        .product-name {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            margin-bottom: 12px;
        }

        .buy-button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            width: 100%;
        }

        @keyframes glow {
            0% { border-color: rgba(255,255,255,0.05); }
            50% { border-color: rgba(255,255,255,0.2); }
            100% { border-color: rgba(255,255,255,0.05); }
        }

        .product-card {
            animation: glow 3s infinite;
        }

        /* Bouton Commander pour la Mini App */
        #commander-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>SHOP KPS PREMIUM V2</h1>
        <p>Service de Refund Qualité</p>
    </header>

    <div class="products-grid" id="grid"></div>

    <button id="commander-btn">COMMANDER SUR TELEGRAM</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const commanderBtn = document.getElementById('commander-btn');

        // Les produits avec des images temporaires pour valider l'interface
        const products = [
            { id: 1, name: "iPhone 14 Pro / Max", price: "110€", img: "https://via.placeholder.com/150" },
            { id: 2, name: "iPhone 15 / Plus", price: "130€", img: "https://via.placeholder.com/150" },
            { id: 3, name: "iPhone 15 Pro / Max", price: "150€", img: "https://via.placeholder.com/150" },
            { id: 4, name: "iPhone 16 / Plus", price: "230€", img: "https://via.placeholder.com/150" },
            { id: 5, name: "iPhone 16 Pro / Max", price: "250€", img: "https://via.placeholder.com/150" },
            { id: 6, name: "iPhone 17 Air", price: "200€", img: "https://via.placeholder.com/150" },
            { id: 7, name: "iPhone 17", price: "270€", img: "https://via.placeholder.com/150" },
            { id: 8, name: "iPhone 17 Pro", price: "320€", img: "https://via.placeholder.com/150" },
            { id: 9, name: "iPhone 17 Pro Max", price: "350€", img: "https://via.placeholder.com/150" },
            { id: 10, name: "MacBook Pro M3 14\"", price: "330€", img: "https://via.placeholder.com/150" },
            { id: 11, name: "MacBook Neo Base", price: "150€", img: "https://via.placeholder.com/150" },
            { id: 12, name: "MacBook Neo Supérieur", price: "180€", img: "https://via.placeholder.com/150" }
        ];

        const grid = document.getElementById('grid');

        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.img}" class="product-image" alt="${product.name}">
                <div class="product-name">${product.name}</div>
                <div class="product-price">${product.price}</div>
                <button class="buy-button" onclick="selectProduct('${product.name}', '${product.price}')">Choisir</button>
            `;
            grid.appendChild(card);
        });

        function selectProduct(name, price) {
            // Afficher le bouton de commande lorsqu'un produit est sélectionné
            commanderBtn.style.display = 'block';

            // Gérer le clic sur le bouton de commande
            commanderBtn.onclick = function() {
                // Envoyer les données de la commande à Telegram
                tg.sendData(JSON.stringify({
                    product: name,
                    price: price
                }));
                // Fermer l'application après la commande
                tg.close();
            };
        }
    </script>
</body>
</html>
