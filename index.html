<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #030305; --card-bg: rgba(22, 12, 15, 0.65); --accent-red: #ff003c; --accent-red-glow: rgba(255, 0, 60, 0.4); --text-main: #ffffff; --text-muted: #b5b5b5; --snap-color: #FFFC00; --tg-color: #24A1DE; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg-color); background: linear-gradient(135deg, #0a0508 0%, #030305 50%, #050914 100%); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; position: relative; }
        .bg-decor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.15; background-image: radial-gradient(var(--accent-red) 1px, transparent 0), radial-gradient(var(--accent-red) 1px, transparent 0); background-size: 24px 24px; background-position: 0 0, 12px 12px; }
        .bg-glow-orb { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, var(--accent-red-glow) 0%, transparent 70%); top: 40%; left: -100px; z-index: -1; pointer-events: none; animation: floatOrb 8s infinite alternate ease-in-out; }
        @keyframes floatOrb { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(40px) scale(1.2); filter: hue-rotate(15deg); } }
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.4s ease, visibility 0.4s; }
        .splash-title { font-size: 26px; font-weight: 900; letter-spacing: 6px; color: var(--text-main); margin-bottom: 25px; text-transform: uppercase; text-shadow: 0 0 15px var(--accent-red-glow); }
        .splash-logo-container { width: 100%; max-width: 280px; height: 280px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; }
        .splash-logo-img { width: 100%; height: 100%; object-fit: contain; mix-blend-mode: screen; image-rendering: pixelated; animation: smoothPulse 2.5s infinite alternate ease-in-out; }
        @keyframes smoothPulse { 0% { transform: scale(0.97); filter: drop-shadow(0 0 8px rgba(255, 0, 60, 0.3)); } 100% { transform: scale(1.03); filter: drop-shadow(0 0 25px rgba(255, 0, 60, 0.6)); } }
        .loading-bar-container { width: 65%; max-width: 220px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .loading-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #99001a, var(--accent-red)); box-shadow: 0 0 10px var(--accent-red); }
        #loading-pct { font-size: 13px; font-weight: 700; margin-top: 10px; color: var(--accent-red); letter-spacing: 2px; }
        #main-content { opacity: 0; transform: translateY(15px); transition: all 0.5s cubic-bezier(0.1, 1, 0.1, 1); padding: 20px; padding-bottom: 40px; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 46px; font-weight: 900; letter-spacing: 10px; margin: 0; text-transform: uppercase; text-shadow: 0 0 20px var(--accent-red-glow); color: #fff; }
        header p { color: var(--accent-red); font-size: 11px; letter-spacing: 3px; font-weight: 900; text-transform: uppercase; margin-top: 8px; text-shadow: 0 0 8px var(--accent-red-glow); }
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 35px; position: relative; z-index: 10; background: rgba(255, 255, 255, 0.03); padding: 6px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .nav-item { background: transparent; border: none; border-radius: 14px; padding: 12px 5px; text-align: center; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
        .nav-item svg { width: 22px; height: 22px; fill: none; stroke: var(--text-main); stroke-width: 2; }
        .nav-item span { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; position: relative; z-index: 10; margin-bottom: 40px; }
        .product-card { background: var(--card-bg); border-radius: 20px; padding: 16px; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; justify-content: space-between; backdrop-filter: blur(12px); }
        .img-box { width: 100%; aspect-ratio: 1/1; border-radius: 14px; background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.4) 100%); overflow: hidden; margin-bottom: 12px; border: 1px solid rgba(255, 0, 60, 0.1); display: flex; align-items: center; justify-content: center; }
        .img-box span { font-weight: 700; font-size: 10px; color: #fff; letter-spacing: 2px; text-transform: uppercase; background: rgba(255, 0, 60, 0.2); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--accent-red); }
        .p-name { font-size: 13px; font-weight: 700; height: 34px; display: flex; align-items: center; justify-content: center; text-align: center; color: #eee; }
        .p-price { font-size: 20px; font-weight: 900; color: #ffffff; margin: 6px 0; text-align: center; }
        .btn-order { background: linear-gradient(90deg, var(--accent-red) 0%, #cc0030 100%); color: #fff; border: none; border-radius: 12px; padding: 14px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; width: 100%; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; align-items: flex-end; z-index: 10000; }
        .modal-content { width: 100%; background: #0b0607; border-radius: 32px 32px 0 0; padding: 30px; border-top: 2px solid rgba(255, 0, 60, 0.3); max-height: 85vh; overflow-y: auto; }
        .modal-handle { width: 40px; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; margin: -15px auto 20px auto; }
        .btn-confirm { background: linear-gradient(135deg, var(--accent-red), #c8002e); color: #fff; width: 100%; padding: 18px; border-radius: 16px; font-weight: 900; border: none; text-transform: uppercase; margin-top: 10px; cursor: pointer; }
        /* ... ajoute le reste de tes styles ici, je n'ai mis que les essentiels pour la structure ... */
    </style>
</head>
<body>

    <div class="bg-decor"></div>
    <div class="bg-glow-orb"></div>

    <div id="splash-screen">
        <div class="splash-title">MAXIME KPS</div>
        <div class="splash-logo-container">
            <img src="https://i.ibb.co/XxfPrLWh/image.png" class="splash-logo-img" alt="KPS Logo">
        </div>
        <div class="loading-bar-container"><div class="loading-bar-fill" id="bar"></div></div>
        <div id="loading-pct">0%</div>
    </div>

    <div id="main-content">
        <header><h1>K P S</h1><p>REFUND APPLE</p></header>
        <div class="nav-grid">
            <div class="nav-item" onclick="openRefundInfo()"><span>Refund</span></div>
            <div class="nav-item" onclick="openReviews()"><span>Avis</span></div>
            <div class="nav-item" onclick="openContactSelector()"><span>Contact</span></div>
            <div class="nav-item" onclick="openTgLink('https://t.me/+a3GNk9gv-9QwMTg0')"><span>Canal</span></div>
        </div>
        <div class="product-grid" id="grid"></div>
    </div>

    <div class="modal-overlay" id="contactModal"><div class="modal-content"><div class="modal-handle"></div>...</div></div>
    <div class="modal-overlay" id="modal"><div class="modal-content"><div class="modal-handle"></div>...</div></div>
    <div class="modal-overlay" id="checkoutModal"><div class="modal-content"><div class="modal-handle"></div>...</div></div>
    <div class="modal-overlay" id="refundModal"><div class="modal-content"><div class="modal-handle"></div>...</div></div>
    <div class="modal-overlay" id="reviewModal"><div class="modal-content"><div class="modal-handle"></div>...</div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- C'EST ICI LA CORRECTION ---
        let modalStack = [];

        function pushModal(id) {
            document.getElementById(id).style.display = 'flex';
            modalStack.push(id);
            tg.BackButton.show();
        }

        function popModal() {
            if (modalStack.length > 0) {
                const id = modalStack.pop();
                document.getElementById(id).style.display = 'none';
            }
            if (modalStack.length === 0) tg.BackButton.hide();
        }

        tg.BackButton.onClick(popModal);

        function openRefundInfo() { pushModal('refundModal'); }
        function openReviews() { pushModal('reviewModal'); }
        function openContactSelector() { pushModal('contactModal'); }
        function openOrder(index) { pushModal('modal'); }
        
        function finishOrderForm() {
            popModal(); // Ferme le formulaire
            pushModal('checkoutModal'); // Ouvre la confirmation
        }

        // --- RESTE DE TON CODE ORIGINAL (Produits, Loader, etc.) ---
        const products = [...]; // Mets bien ta liste complète ici
        // ... (ton code pour générer la grille, le loader, etc.) ...
    </script>
</body>
</html>
