<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #030305; --card-bg: rgba(22, 12, 15, 0.65); --accent-red: #ff003c; --accent-red-glow: rgba(255, 0, 60, 0.4); --text-main: #ffffff; --text-muted: #b5b5b5; --snap-color: #FFFC00; --tg-color: #24A1DE; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg-color); background: linear-gradient(135deg, #0a0508 0%, #030305 50%, #050914 100%); color: var(--text-main); margin: 0; padding: 0; overflow-x: hidden; }
        /* [TON CSS ORIGINAL] */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loading-bar-container { width: 65%; height: 4px; background: rgba(255,255,255,0.08); margin-top: 15px; }
        .loading-bar-fill { width: 0%; height: 100%; background: var(--accent-red); }
        #main-content { opacity: 0; transition: opacity 0.5s; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; z-index: 10000; }
        .modal-content { width: 100%; background: #0b0607; padding: 30px; border-radius: 32px 32px 0 0; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-title">MAXIME KPS</div>
        <img src="https://i.ibb.co/XxfPrLWh/image.png" style="width:200px">
        <div class="loading-bar-container"><div class="loading-bar-fill" id="bar"></div></div>
        <div id="loading-pct">0%</div>
    </div>

    <div id="main-content">
        <div class="product-grid" id="grid"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- CORRECTION DU SYSTÈME DE NAVIGATION ---
        let modalStack = [];

        function pushModal(id) {
            document.getElementById(id).style.display = 'flex';
            modalStack.push(id);
            tg.BackButton.show();
        }

        function popModal() {
            if (modalStack.length > 0) {
                const id = modalStack.pop();
                document.getElementById(id).style.display = 'none';
            }
            if (modalStack.length === 0) tg.BackButton.hide();
        }

        tg.BackButton.onClick(popModal);

        // --- GÉNÉRATION DES PRODUITS (IDENTIQUE À TON CODE) ---
        const products = [
            { name: "iPhone 16 Pro Max", price: "250€", label: "IPHONE 16 PM", storage: ["128Go", "256Go"], colors: ["Noir", "Blanc"] },
            { name: "iPhone 15 Pro Max", price: "150€", label: "IPHONE 15 PM", storage: ["256Go", "512Go"], colors: ["Titane", "Bleu"] }
        ];

        const grid = document.getElementById('grid');
        products.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `<h3>${p.label}</h3><p>${p.price}</p><button onclick="openOrder(${i})">Commander</button>`;
            grid.appendChild(card);
        });

        function openOrder(i) { pushModal('modal'); }

        // --- LOADER CORRIGÉ ---
        let pct = 0;
        function runLoader() {
            pct += 5;
            document.getElementById('bar').style.width = pct + '%';
            document.getElementById('loading-pct').innerText = pct + '%';
            if (pct < 100) {
                setTimeout(runLoader, 50);
            } else {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
            }
        }
        runLoader();
    </script>
</body>
</html>
